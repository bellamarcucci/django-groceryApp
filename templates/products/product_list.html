{% extends "base.html" %}

{% block content %}
<h2>Products</h2>

<div class="row">
    {% for product in products %}
        <div class="col-md-4 mb-4">
            <div class="card p-3">
                <h5>{{ product.name }}</h5>
                <p>$ {{ product.price }}</p>

                <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success">
                    Add to Cart
                </a>
            </div>
        </div>
    {% empty %}
        <p>No products available.</p>
    {% endfor %}
</div>
{% endblock %}
